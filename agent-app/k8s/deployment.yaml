apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-payment-agent
  namespace: agent365
  labels:
    app: test-payment-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-payment-agent
  template:
    metadata:
      labels:
        app: test-payment-agent
    spec:
      serviceAccountName: test-payment-agent-sa
      containers:
        - name: agent
          image: acragent365test.azurecr.io/test-payment-agent:v1
          ports:
            - containerPort: 3978
              name: http
          envFrom:
            - configMapRef:
                name: test-payment-agent-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3978
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3978
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: test-payment-agent
  namespace: agent365
spec:
  selector:
    app: test-payment-agent
  ports:
    - port: 80
      targetPort: 3978
      protocol: TCP
  type: ClusterIP
